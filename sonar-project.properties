sonar.projectKey=PEI-HAZARDS_IntelligentLogistics
sonar.organization=pei-hazards
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/*.test.py,**/tests/**,**/htmlcov/**,**/__pycache__/**,src/AI_APP/broker/dashboard/**,deprecated/**,src/shared/src/kafka_simulate.py
# Exclude agents from duplication detection only
sonar.cpd.exclusions=**/init.py,**/setup.py
sonar.python.version=3.14
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=**/__main__.py,**/__init__.py,**/setup.py,**/init.py,**/config.py,**/conftest.py,src/V_APP/Data_Module/**,src/V_APP/api_gateway/**,src/V_APP/keycloak/**,src/V_APP/test_scripts/**,src/V_APP/api_gateway/src/main.py,src/shared/src/base_gateway.py,src/AI_APP/broker/dashboard/**,src/devops/**,src/streaming_middleware/**,src/streamV2/**,src/go2rtc/**,**/tests/**,src/V_APP/Data_Module/scripts/**
# Suppress Dockerfile pip install security rules (docker:S8541, docker:S8544).
# S8541 requires --only-binary :all: to avoid executing setup scripts from source distributions.
# S8544 requires fully pinned transitive dependencies in requirements files.
# Suppressed because:
#   - All services run in controlled internal environments (not public-facing image registries).
#   - Adding --only-binary :all: would break services whose dependencies lack binary wheels for
#     the target platform (e.g. packages requiring native compilation on arm/linux variants).
#   - Full transitive pinning across ~10 services is deferred to a dedicated dependency-lock task.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S8541
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Dockerfile*
sonar.issue.ignore.multicriteria.e2.ruleKey=docker:S8544
sonar.issue.ignore.multicriteria.e2.resourceKey=**/Dockerfile*
