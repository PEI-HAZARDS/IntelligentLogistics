###############################################
# Server Settings
###############################################
webrtc: true
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcAdditionalHosts: [10.255.32.56]

logLevel: info

authInternalUsers:
  - user: prometheus
    pass: prometheus_pei
    permissions:
      - action: metrics

metrics: true
metricsAddress: :9998

rtsp: true
rtspAddress: :8554
rtpAddress: :8000
rtcpAddress: :8001
# Server accepts UDP from downstream clients (AI agents, VLC, etc.)
rtspTransports: [udp, tcp]

rtmp: false
hls: false
srt: false

###############################################
# Path defaults
###############################################
pathDefaults:
   rtspTransport: tcp
   sourceOnDemand: true
   sourceOnDemandStartTimeout: 10s # how long to wait for camera to respond
   sourceOnDemandCloseAfter: 3s # how long to keep stream alive after last client disconnects

###############################################
# Paths
###############################################
paths:
   streams_high/gate1:
      source: rtsp://10.16.9.3:554/stream1

   streams_low/gate1:
      source: rtsp://10.16.9.3:554/stream2

   streams_high/gate2:
      source: rtsp://10.16.9.4:554/stream1

   streams_low/gate2:
      source: rtsp://10.16.9.4:554/stream2