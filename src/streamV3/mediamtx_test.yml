###############################################
# Server Settings
###############################################
webrtc: true
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcAdditionalHosts: [10.255.32.56]

logLevel: info

rtsp: true
rtspAddress: :8554
rtpAddress: :8000
rtcpAddress: :8001
# Server accepts UDP from downstream clients (AI agents, VLC, etc.)
rtspTransports: [udp]

rtmp: false
hls: false
srt: false

###############################################
# Path defaults
###############################################
pathDefaults:
   rtspTransport: tcp
   
###############################################
# Paths
###############################################
paths:
   streams_high/gate1:
    runOnDemand: ffmpeg -re -stream_loop -1 -i ./videos/gate.mp4 -c copy -f rtsp rtsp://localhost:8554/streams_high/gate1
   
   streams_low/gate1:
    runOnDemand: ffmpeg -re -stream_loop -1 -i ./videos/gate.mp4 -c copy -f rtsp rtsp://localhost:8554/streams_low/gate1
   
   streams_high/gate2:
    runOnDemand: ffmpeg -re -stream_loop -1 -i ./videos/highway.mp4 -c copy -f rtsp rtsp://localhost:8554/streams_high/gate2
   
   streams_low/gate2:
    runOnDemand: ffmpeg -re -stream_loop -1 -i ./videos/highway.mp4 -c copy -f rtsp rtsp://localhost:8554/streams_low/gate2