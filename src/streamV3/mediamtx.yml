###############################################
# Server Settings
###############################################
webrtc: yes
webrtcAddress: :8889
webrtcLocalUDPAddress: :8189
webrtcAdditionalHosts: [10.255.32.56]

rtsp: yes
rtspAddress: :8554
rtpAddress: :8000
rtcpAddress: :8001
# Server accepts UDP from downstream clients (AI agents, VLC, etc.)
rtspTransports: [udp]
readTimeout: 10s
writeTimeout: 10s

rtmp: no
hls: no
srt: no

###############################################
# Path defaults
###############################################
pathDefaults:
  # Cameras are 4K (3840x2160) generating ~30-50 Mbps per stream.
  # At that bitrate, each video frame is split into hundreds of UDP packets
  # fired across the router between 10.16.9.x and 10.255.32.x.
  # When the router buffer fills, it silently drops packets — UDP has no
  # retry mechanism, so MediaMTX never recovers them and times out after 3s.
  # TCP retransmits any dropped packets automatically, so the stream stays
  # stable at the cost of a few extra milliseconds of latency — acceptable
  # for a fixed camera feed.
  rtspTransport: tcp

###############################################
# Paths (Your Cameras)
###############################################
paths:
  streams_high/gate1:
    source: rtsp://10.16.9.2:554/stream1

  streams_low/gate1:
    source: rtsp://10.16.9.2:554/stream2

  streams_high/gate2:
    source: rtsp://10.16.9.4:554/stream1

  streams_low/gate2:
    source: rtsp://10.16.9.4:554/stream2