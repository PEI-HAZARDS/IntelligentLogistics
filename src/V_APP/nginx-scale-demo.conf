# Nginx upstream config for horizontal scale-out demo (Milestone 4 — Scalability).
#
# Distributes load across two data-module replicas spun up with:
#   docker-compose up -d --scale data-module=2
#
# Docker Compose assigns container names: dm_data_module, dm_data_module_2
# (or numbered differently — verify with: docker ps --format '{{.Names}}' | grep data)
#
# Start Nginx:
#   docker run --rm -d --name nginx-dm \
#     --network v_app_default \
#     -p 9090:80 \
#     -v $(pwd)/src/V_APP/nginx-scale-demo.conf:/etc/nginx/nginx.conf:ro \
#     nginx:alpine
#
# Then run the stress test against :9090 instead of :8080.

events {
    worker_connections 1024;
}

http {
    upstream data_module {
        # Round-robin between two replicas.
        # Container names assigned by docker-compose --scale:
        server dm_data_module:8000;
        server dm_data_module_2:8000;

        keepalive 32;
    }

    server {
        listen 80;

        location / {
            proxy_pass         http://data_module;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Generous timeouts so slow Mongo aggregations don't time out at the proxy
            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
        }
    }
}
