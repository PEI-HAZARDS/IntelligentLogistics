x-agenta-base: &agenta-base
  build:
    context: ..
    dockerfile: AI_APP/agentA/Dockerfile
  image: agenta:latest
  restart: unless-stopped
  env_file: .env
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  depends_on:
    kafka-init:
      condition: service_completed_successfully
  command: ["python", "AI_APP/agentA/init.py"]

x-agentb-base: &agentb-base
  build:
    context: ..
    dockerfile: AI_APP/agentB/Dockerfile
  image: agentb:latest
  restart: unless-stopped
  env_file: .env
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  depends_on:
    kafka-init:
      condition: service_completed_successfully
  command: ["python", "AI_APP/agentB/init.py"]

x-agentc-base: &agentc-base
  build:
    context: ..
    dockerfile: AI_APP/agentC/Dockerfile
  image: agentc:latest
  restart: unless-stopped
  env_file: .env
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]
  depends_on:
    kafka-init:
      condition: service_completed_successfully
  command: ["python", "AI_APP/agentC/init.py"]

services:
  agenta-1:
    <<: *agenta-base
    container_name: agenta-1
    ports:
      - "${AGENTA_1_PORT}:8000"
    environment:
      - GATE_ID=1
      - MODELS_PATH=${MODELS_PATH_A}

  agentb-1:
    <<: *agentb-base
    container_name: agentb-1
    ports:
      - "${AGENTB_1_PORT}:8000"
    environment:
      - GATE_ID=1
      - MODELS_PATH=${MODELS_PATH_B}

  agentc-1:
    <<: *agentc-base
    container_name: agentc-1
    ports:
      - "${AGENTC_1_PORT}:8000"
    environment:
      - GATE_ID=1
      - MODELS_PATH=${MODELS_PATH_C}
  
  agenta-2:
    <<: *agenta-base
    container_name: agenta-2
    ports:
      - "${AGENTA_2_PORT}:8000"
    environment:
      - GATE_ID=2
      - MODELS_PATH=${MODELS_PATH_A}

  agentb-2:
    <<: *agentb-base
    container_name: agentb-2
    ports:
      - "${AGENTB_2_PORT}:8000"
    environment:
      - GATE_ID=2
      - MODELS_PATH=${MODELS_PATH_B}

  agentc-2:
    <<: *agentc-base
    container_name: agentc-2
    ports:
      - "${AGENTC_2_PORT}:8000"
    environment:
      - GATE_ID=2
      - MODELS_PATH=${MODELS_PATH_C}
  
  ai-gateway:
    build:
      context: ..
      dockerfile: AI_APP/gateway/Dockerfile
    image: ai-gateway:latest
    container_name: ai-gateway
    restart: unless-stopped
    env_file: .env
    ports:
      - "8003:8000"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "-m", "AI_APP.gateway"]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # KRaft mode configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # Listeners
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://10.255.32.110:9092"
      # Single node settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Auto-create topics for development
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Cluster ID for KRaft
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      # Log dirs
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka to be ready..."
        cub kafka-ready -b kafka:29092 1 60

        # Parse GATE_IDS from JSON-array string e.g. ["1","2","3"] -> "1 2 3"
        GATE_ID_LIST=$(echo "$$GATE_IDS" | tr -d '[]"' | tr ',' ' ')

        echo "Creating topics for gate IDs: $$GATE_ID_LIST"
        for GID in $$GATE_ID_LIST; do
          for TOPIC in \
            truck-detected-$$GID \
            lp-results-$$GID \
            hz-results-$$GID \
            operator-decision-$$GID \
            reset-agentA-$$GID \
            agent-decision-$$GID; do
            kafka-topics --create --if-not-exists \
              --bootstrap-server kafka:29092 \
              --partitions 1 \
              --replication-factor 1 \
              --topic "$$TOPIC"
          done
        done

        echo "All topics created."
    env_file:
      - .env
    restart: "no"

  kafka-dashboard:
    build: ./broker/dashboard
    container_name: kafka-dashboard
    ports:
      - "8091:8091"
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
      - GATE_ID=1
    depends_on:
      - kafka
      - kafka-exporter
      - agenta-1
      - agentb-1
      - agentc-1
    restart: unless-stopped

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    ports:
      - "9090:8080"
    environment:
      KAFKA_BROKERS: kafka:29092
    depends_on:
    - kafka
    - kafka-exporter
    - agenta-1
    - agentb-1
    - agentc-1
    restart: unless-stopped

  # =============================================================================
  # OBSERVABILITY - Node Exporter + Promtail
  # =============================================================================
  
  # Prometheus exporter for Kafka metrics
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:29092
    depends_on:
      - kafka
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
    environment:
      - VM_NAME=IA_APP
      - LOKI_URL=10.255.32.132
    volumes:
      - /home/pei_user/IA_APP/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
