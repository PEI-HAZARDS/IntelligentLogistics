services:
  agenta:
    build:
      context: ..             # src/ directory as build context
      dockerfile: AI_APP/Dockerfile  # Path to unified Dockerfile from src/
    image: agenta:latest
    container_name: agenta
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MODELS_PATH=/app/AI_APP/agentA/data
    env_file:
      - agentA/.env
    command: ["python", "AI_APP/agentA/init.py"]

  agentb:
    build:
      context: ..             # src/ directory as build context
      dockerfile: AI_APP/Dockerfile  # Path to unified Dockerfile from src/
    image: agentb:latest
    container_name: agentb
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MODELS_PATH=/app/AI_APP/agentB/data
    env_file:
      - agentB/.env
    command: ["python", "AI_APP/agentB/init.py"]

  agentc:
    build:
      context: ..             # src/ directory as build context
      dockerfile: AI_APP/Dockerfile  # Path to unified Dockerfile from src/
    image: agentc:latest
    container_name: agentc
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - MODELS_PATH=/app/AI_APP/agentC/data
    env_file:
      - agentC/.env
    command: ["python", "AI_APP/agentC/init.py"]
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # KRaft mode configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # Listeners
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://10.255.32.110:9092"
      # Single node settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Auto-create topics for development
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Cluster ID for KRaft
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      # Log dirs
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka

  kafka-dashboard:
    build: ./broker/dashboard
    container_name: kafka-dashboard
    ports:
      - "8091:8091"
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
      - GATE_ID=1
    depends_on:
      - kafka
      - kafka-ui
      - kafka-exporter
      - agenta
      - agentb
      - agentc
    restart: unless-stopped

  # Prometheus exporter for Kafka metrics
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:29092
    depends_on:
      - kafka
    restart: unless-stopped

