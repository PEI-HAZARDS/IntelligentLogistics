services:
  agenta:
    build:
      context: ..             # src/ directory as build context
      dockerfile: AI_APP/Dockerfile  # Path to unified Dockerfile from src/
    image: agenta:latest
    container_name: agenta
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MODELS_PATH=${MODELS_PATH_A}
    env_file:
      - .env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "AI_APP/agentA/init.py"]

  agentb:
    build:
      context: ..             # src/ directory as build context
      dockerfile: AI_APP/Dockerfile  # Path to unified Dockerfile from src/
    image: agentb:latest
    container_name: agentb
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MODELS_PATH=${MODELS_PATH_B}
      - BUCKET_NAME=${BUCKET_NAME_LP}
    env_file:
      - .env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "AI_APP/agentB/init.py"]

  agentc:
    build:
      context: ..             # src/ directory as build context
      dockerfile: AI_APP/Dockerfile  # Path to unified Dockerfile from src/
    image: agentc:latest
    container_name: agentc
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - MODELS_PATH=${MODELS_PATH_C}
      - BUCKET_NAME=${BUCKET_NAME_HZ}
    env_file:
      - .env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "AI_APP/agentC/init.py"]

  ai-gateway:
    build:
      context: ..
      dockerfile: AI_APP/Dockerfile
    image: ai-gateway:latest
    container_name: ai-gateway
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - GATEWAY_PORT=8003
    env_file:
      - .env
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "-m", "AI_APP.gateway"]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # KRaft mode configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # Listeners
      KAFKA_LISTENERS: "INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://10.255.32.110:9092"
      # Single node settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Auto-create topics for development
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Cluster ID for KRaft
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      # Log dirs
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
    
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      - kafka
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka to be ready..."
        cub kafka-ready -b kafka:29092 1 60

        echo "Creating topics..."
        for TOPIC in \
          truck-detected-${GATE_ID} \
          lp-results-${GATE_ID} \
          hz-results-${GATE_ID} \
          decision-results-${GATE_ID}; do
          kafka-topics --create --if-not-exists \
            --bootstrap-server kafka:29092 \
            --partitions 1 \
            --replication-factor 1 \
            --topic "$$TOPIC"
        done

        echo "All topics created."
    env_file:
      - .env
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka

  kafka-dashboard:
    build: ./broker/dashboard
    container_name: kafka-dashboard
    ports:
      - "8091:8091"
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
      - GATE_ID=1
    depends_on:
      - kafka
      - kafka-ui
      - kafka-exporter
      - agenta
      - agentb
      - agentc
    restart: unless-stopped

  # Prometheus exporter for Kafka metrics
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:29092
    depends_on:
      - kafka
    restart: unless-stopped

  # =============================================================================
  # OBSERVABILITY - Node Exporter + Promtail
  # =============================================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    environment:
      - VM_NAME=IA_APP
      - LOKI_URL=10.255.32.132
    volumes:
      - ../devops/promtail-remote/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
