# Prometheus Configuration for IntelligentLogistics
# Scrapes metrics from all services across VMs

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'intelligent-logistics'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - /etc/prometheus/alerts/*.yml

# Scrape configurations
scrape_configs:
  # =============================================================================
  # PROMETHEUS SELF-MONITORING
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # =============================================================================
  # NODE EXPORTER - Jenkins VM (Observability + CI/CD)
  # =============================================================================
  - job_name: 'node-exporter-jenkins'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'jenkins-vm'
          vm: 'Jenkins'

  # =============================================================================
  # NODE EXPORTER - IA_APP VM (10.255.32.110)
  # =============================================================================
  - job_name: 'node-exporter-ia-app'
    static_configs:
      - targets: ['10.255.32.110:9100']
        labels:
          instance: 'ia-app-vm'
          vm: 'IA_APP'

  # =============================================================================
  # NODE EXPORTER - V_APP VM (10.255.32.70)
  # =============================================================================
  - job_name: 'node-exporter-v-app'
    static_configs:
      - targets: ['10.255.32.70:9100']
        labels:
          instance: 'v-app-vm'
          vm: 'V_APP'

  # =============================================================================
  # NODE EXPORTER - Nginx VM (10.255.32.56)
  # =============================================================================
  - job_name: 'node-exporter-nginx'
    static_configs:
      - targets: ['10.255.32.56:9100']
        labels:
          instance: 'nginx-vm'
          vm: 'Nginx'

  # =============================================================================
  # DATA MODULE - V_APP VM (10.255.32.70)
  # =============================================================================
  - job_name: 'data-module'
    metrics_path: /metrics
    static_configs:
      - targets: ['10.255.32.70:8080']
        labels:
          service: 'data-module'
          vm: 'V_APP'

  # =============================================================================
  # API GATEWAY - V_APP VM (10.255.32.70)
  # =============================================================================
  - job_name: 'api-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['10.255.32.70:8000']
        labels:
          service: 'api-gateway'
          vm: 'V_APP'

  # =============================================================================
  # DECISION ENGINE - V_APP VM (10.255.32.70)
  # =============================================================================
  - job_name: 'decision-engine'
    metrics_path: /metrics
    static_configs:
      - targets: ['10.255.32.70:8001']
        labels:
          service: 'decision-engine'
          vm: 'V_APP'

  # =============================================================================
  # ML AGENTS - IA_APP VM (10.255.32.110)
  # =============================================================================
  - job_name: 'agent-a'
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ['10.255.32.110:8000']
        labels:
          service: 'agent-a'
          type: 'ml-agent'
          vm: 'IA_APP'

  - job_name: 'agent-b'
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ['10.255.32.110:8001']
        labels:
          service: 'agent-b'
          type: 'ml-agent'
          vm: 'IA_APP'

  - job_name: 'agent-c'
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ['10.255.32.110:8002']
        labels:
          service: 'agent-c'
          type: 'ml-agent'
          vm: 'IA_APP'

  # =============================================================================
  # KAFKA EXPORTER - IA_APP VM (10.255.32.110)
  # =============================================================================
  - job_name: 'kafka'
    static_configs:
      - targets: ['10.255.32.110:9308']
        labels:
          service: 'kafka'
          vm: 'IA_APP'

  # =============================================================================
  # AI GATEWAY - IA_APP VM (10.255.32.110)
  # =============================================================================
  - job_name: 'ai-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['10.255.32.110:8003']
        labels:
          service: 'ai-gateway'
          vm: 'IA_APP'

  # =============================================================================
  # V GATEWAY - V_APP VM (10.255.32.70)
  # =============================================================================
  - job_name: 'v-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['10.255.32.70:8003']
        labels:
          service: 'v-gateway'
          vm: 'V_APP'
