apiVersion: 1

policies:
  - orgId: 1
    receiver: email-pei
    group_by: ['grafana_folder', 'alertname']
    routes:
      - receiver: email-pei
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 1h
      - receiver: email-pei
        matchers:
          - severity = warning
        group_wait: 1m
        group_interval: 10m
        repeat_interval: 4h
